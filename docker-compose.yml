# 3-node kvraft cluster + Prometheus.
# Each node advertises its service-name:4321 as its Raft address so the
# other replicas can dial it over the Compose network.

services:
  kvraft-1:
    build: .
    container_name: kvraft-1
    hostname: kvraft-1
    environment:
      NODE_ID: node-1
      RAFT_BIND: kvraft-1:4321
      RAFT_PEERS: '["kvraft-2:4321","kvraft-3:4321"]'
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY in .env}
      SIMILARITY_THRESHOLD: "0.85"
    ports:
      - "8001:8000"
    networks: [kvraft-net]

  kvraft-2:
    build: .
    container_name: kvraft-2
    hostname: kvraft-2
    environment:
      NODE_ID: node-2
      RAFT_BIND: kvraft-2:4321
      RAFT_PEERS: '["kvraft-1:4321","kvraft-3:4321"]'
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY in .env}
      SIMILARITY_THRESHOLD: "0.85"
    ports:
      - "8002:8000"
    networks: [kvraft-net]

  kvraft-3:
    build: .
    container_name: kvraft-3
    hostname: kvraft-3
    environment:
      NODE_ID: node-3
      RAFT_BIND: kvraft-3:4321
      RAFT_PEERS: '["kvraft-1:4321","kvraft-2:4321"]'
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY in .env}
      SIMILARITY_THRESHOLD: "0.85"
    ports:
      - "8003:8000"
    networks: [kvraft-net]

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: kvraft-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks: [kvraft-net]
    depends_on: [kvraft-1, kvraft-2, kvraft-3]

networks:
  kvraft-net:
    driver: bridge
