repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: pytest
        name: pytest (unit tests only)
        entry: pytest -m "not integration" --tb=short -q
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: status-freshness
        name: STATUS.md updated in last 30 min
        entry: bash -c 'if [ -n "$(git diff --cached --name-only | grep -v STATUS.md)" ] && [ -z "$(git diff --cached --name-only | grep STATUS.md)" ]; then echo "WARNING: committing code changes without touching STATUS.md — did you update it?" ; fi; exit 0'
        language: system
        pass_filenames: false
        stages: [pre-commit]
